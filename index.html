<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- HTML Meta Tags -->
    <title>Néstor Pérez | prryplatypus</title>
    <meta name="description" content="About me">

    <!-- Facebook Meta Tags -->
    <meta property="og:url" content="https://prryplatypus.dev/">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Néstor Pérez | prryplatypus">
    <meta property="og:description" content="About me">
    <meta property="og:image" content="https://prryplatypus.dev/prryplatypus.jpg">

    <link rel="icon" type="image/jpg" href="https://prryplatypus.dev/prryplatypus.jpg">
    <title>Néstor Pérez | prryplatypus</title>
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta2/css/brands.min.css"
        integrity="sha512-lCU0XyQA8yobR7ychVxEOU5rcxs0+aYh/9gNDLaybsgW9hdrtqczjfKVNIS5doY0Y5627/+3UVuoGv7p8QsUFw=="
        crossorigin="anonymous"
    />
    <style>
        :root {
            --platypus-blue: #01b8c8;
        }
        html {
            margin: 0;
            height: 100%;
            width: 100%;
        }
        body {
            margin: 0;
            min-height: 100%;
            width: 100%;
            background-color: var(--platypus-blue);
            font-family: 'Courier New', Courier, monospace;
        }
        .fullname {
            font-size: 50px;
            font-weight: bold;
            margin-bottom: 0;
            margin-top: 30px;
            text-align: center;
        }
        .profile-icon {
            max-height: 200px;
            max-width: 200px;
        }
        .social-detail {
            margin: 0;
            margin-top: 15px;
            border-bottom: 2px solid transparent;
            text-align: center;
            text-decoration: none;
            color: black;
        }
        .social-detail:hover {
            border-bottom: 2px solid black;
            cursor: pointer;
            margin-bottom: 0;
        }
        .social-icon {
            vertical-align: middle;
            font-size: 25px;
        }
        .socials {
            display: flex;
            flex-direction: column;
            justify-content: center;
            margin-top: 10px;
            font-size: 30px;
        }
        .wrapper {
            min-height: 100vh;
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <img class="profile-icon" src="./prryplatypus_xmas.svg" alt="Profile picture"/>
        <p class="fullname">
            Néstor Pérez
        </p>
        <div class="socials">
            <a href="https://github.com/prryplatypus" target="_blank" class="social-detail">
                <span class="fa-brands fa-github social-icon" aria-hidden="true"></span>
                <span>prryplatypus</span>
            </a>
            <a href="https://twitter.com/prryplatypus" target="_blank" class="social-detail">
                <span class="fa-brands fa-twitter social-icon" aria-hidden="true"></span>
                <span>prryplatypus</span>
            </a>
        </div>
    </div>
</body>
</html>
